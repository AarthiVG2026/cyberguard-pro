<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="featureGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#featureGradient)" opacity="0.1"/>
  
  <!-- Central Hub -->
  <g transform="translate(300, 200)">
    <circle cx="0" cy="0" r="40" fill="#00d4ff" opacity="0.3"/>
    <circle cx="0" cy="0" r="25" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="0" cy="0" r="10" fill="#00ff88"/>
    <text x="0" y="5" text-anchor="middle" fill="#000" font-size="8" font-weight="bold">CORE</text>
  </g>
  
  <!-- Feature Nodes -->
  
  <!-- URL Scanner -->
  <g transform="translate(150, 100)">
    <circle cx="0" cy="0" r="20" fill="#00d4ff" opacity="0.7"/>
    <path d="M-8 -8L8 -8L8 8L-8 8Z" fill="#ffffff"/>
    <circle cx="0" cy="0" r="6" fill="#00d4ff">
      <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="35" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="bold">URL Scanner</text>
    <line x1="20" y1="20" x2="240" y2="160" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Password Analyzer -->
  <g transform="translate(450, 100)">
    <circle cx="0" cy="0" r="20" fill="#8b5cf6" opacity="0.7"/>
    <rect x="-6" y="-8" width="12" height="10" rx="2" fill="#ffffff"/>
    <path d="M-4 -8v-4a4 4 0 0 1 8 0v4" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="0" cy="-3" r="2" fill="#8b5cf6"/>
    <text x="0" y="35" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="bold">Password Analyzer</text>
    <line x1="-20" y1="20" x2="-60" y2="160" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Threat Detection -->
  <g transform="translate(100, 300)">
    <circle cx="0" cy="0" r="20" fill="#ff0059" opacity="0.7"/>
    <path d="M-6 -6L6 6M6 -6L-6 6" stroke="#ffffff" stroke-width="3"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" fill="#ff0059" font-size="12" font-weight="bold">Threat Detection</text>
    <line x1="20" y1="-20" x2="240" y2="-40" stroke="#ff0059" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Report Generator -->
  <g transform="translate(500, 300)">
    <circle cx="0" cy="0" r="20" fill="#00ff88" opacity="0.7"/>
    <rect x="-8" y="-8" width="16" height="12" rx="2" fill="#ffffff"/>
    <rect x="-6" y="-6" width="12" height="2" fill="#00ff88"/>
    <rect x="-6" y="-2" width="12" height="2" fill="#00ff88"/>
    <rect x="-6" y="2" width="8" height="2" fill="#00ff88"/>
    <text x="0" y="35" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">Report Generator</text>
    <line x1="-20" y1="-20" x2="-60" y2="-40" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Security Dashboard -->
  <g transform="translate(300, 50)">
    <circle cx="0" cy="0" r="18" fill="#00d4ff" opacity="0.7"/>
    <rect x="-10" y="-8" width="20" height="12" rx="2" fill="#ffffff"/>
    <rect x="-8" y="-6" width="16" height="8" fill="#000"/>
    <rect x="-2" y="4" width="4" height="2" fill="#00d4ff"/>
    <text x="0" y="35" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="bold">Dashboard</text>
    <line x1="0" y1="18" x2="0" y2="135" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Analytics -->
  <g transform="translate(300, 350)">
    <circle cx="0" cy="0" r="18" fill="#8b5cf6" opacity="0.7"/>
    <rect x="-8" y="-6" width="4" height="8" fill="#ffffff"/>
    <rect x="-2" y="-4" width="4" height="6" fill="#ffffff"/>
    <rect x="4" y="-8" width="4" height="10" fill="#ffffff"/>
    <text x="0" y="35" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="bold">Analytics</text>
    <line x1="0" y1="-18" x2="0" y2="-115" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Data Flow Animation -->
  <g opacity="0.4">
    <!-- Circular data flow -->
    <circle cx="300" cy="200" r="100" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Connecting lines with data flow -->
    <g stroke-dasharray="3,3" opacity="0.6">
      <line x1="150" y1="100" x2="300" y2="50" stroke="#00d4ff" stroke-width="1">
        <animate attributeName="stroke-dashoffset" values="0;6" dur="1s" repeatCount="indefinite"/>
      </line>
      <line x1="450" y1="100" x2="300" y2="50" stroke="#8b5cf6" stroke-width="1">
        <animate attributeName="stroke-dashoffset" values="0;6" dur="1.2s" repeatCount="indefinite"/>
      </line>
      <line x1="100" y1="300" x2="300" y2="350" stroke="#ff0059" stroke-width="1">
        <animate attributeName="stroke-dashoffset" values="0;6" dur="1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="500" y1="300" x2="300" y2="350" stroke="#00ff88" stroke-width="1">
        <animate attributeName="stroke-dashoffset" values="0;6" dur="1.8s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>
  
  <!-- Floating security particles -->
  <g opacity="0.3">
    <circle cx="80" cy="80" r="2" fill="#00d4ff">
      <animateTransform attributeName="transform" type="translate" values="0 0;10 -10;0 0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="80" r="2" fill="#8b5cf6">
      <animateTransform attributeName="transform" type="translate" values="0 0;-10 10;0 0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="320" r="2" fill="#00ff88">
      <animateTransform attributeName="transform" type="translate" values="0 0;10 10;0 0" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="320" r="2" fill="#ff0059">
      <animateTransform attributeName="transform" type="translate" values="0 0;-10 -10;0 0" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#00d4ff" font-size="18" font-weight="bold">Security Feature Network</text>
</svg>