<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <defs>
    <!-- Animated shield icon -->
    <g id="animated-shield">
      <path d="M12 2L2 7l0 10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12L20 7l-10-5z" fill="#00d4ff" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M12 3L3 7.5l0 8.5c0 4.5 3.5 8.5 8 9.5 4.5-1 8-5 8-9.5L19 7.5l-9-4.5z" fill="none" stroke="#00ff88" stroke-width="2"/>
      <circle cx="12" cy="12" r="3" fill="#00ff88">
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Animated lock icon -->
    <g id="animated-lock">
      <rect x="6" y="10" width="12" height="8" rx="2" fill="#8b5cf6" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
      </rect>
      <path d="M8 10v-2a4 4 0 0 1 8 0v2" fill="none" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="12" cy="14" r="2" fill="#00ff88">
        <animate attributeName="fill" values="#00ff88;#ff0059;#00ff88" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Animated network icon -->
    <g id="animated-network">
      <circle cx="5" cy="5" r="3" fill="#00d4ff">
        <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="19" cy="5" r="3" fill="#8b5cf6">
        <animate attributeName="r" values="3;4;3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="12" cy="19" r="3" fill="#00ff88">
        <animate attributeName="r" values="3;4;3" dur="2s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <path d="M8 5L16 5M8 5L10 17M16 5L14 17" stroke="#ffffff" stroke-width="2" opacity="0.6">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Animated CPU/chip icon -->
    <g id="animated-cpu">
      <rect x="8" y="8" width="8" height="8" rx="1" fill="#ff0059" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="10" y="10" width="4" height="4" rx="0.5" fill="#00d4ff">
        <animate attributeName="fill" values="#00d4ff;#00ff88;#00d4ff" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <!-- Pins -->
      <rect x="6" y="9" width="2" height="1" fill="#ffffff"/>
      <rect x="6" y="11" width="2" height="1" fill="#ffffff"/>
      <rect x="6" y="13" width="2" height="1" fill="#ffffff"/>
      <rect x="16" y="9" width="2" height="1" fill="#ffffff"/>
      <rect x="16" y="11" width="2" height="1" fill="#ffffff"/>
      <rect x="16" y="13" width="2" height="1" fill="#ffffff"/>
      <rect x="9" y="6" width="1" height="2" fill="#ffffff"/>
      <rect x="11" y="6" width="1" height="2" fill="#ffffff"/>
      <rect x="13" y="6" width="1" height="2" fill="#ffffff"/>
      <rect x="9" y="16" width="1" height="2" fill="#ffffff"/>
      <rect x="11" y="16" width="1" height="2" fill="#ffffff"/>
      <rect x="13" y="16" width="1" height="2" fill="#ffffff"/>
    </g>
    
    <!-- Animated radar/scan icon -->
    <g id="animated-radar">
      <circle cx="12" cy="12" r="8" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
      <circle cx="12" cy="12" r="6" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
      <circle cx="12" cy="12" r="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
      <circle cx="12" cy="12" r="2" fill="#00d4ff"/>
      <path d="M12 12L12 4" stroke="#00ff88" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" values="0 12 12;360 12 12" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Binary code streams -->
    <g id="binary-stream">
      <text x="0" y="0" font-family="monospace" font-size="10" fill="#00d4ff">
        <tspan x="0" dy="0">1010</tspan>
        <tspan x="0" dy="12">1100</tspan>
        <tspan x="0" dy="12">0101</tspan>
        <tspan x="0" dy="12">1001</tspan>
        <animateTransform attributeName="transform" type="translateY" values="0;-48" dur="2s" repeatCount="indefinite"/>
      </text>
    </g>
  </defs>
</svg>