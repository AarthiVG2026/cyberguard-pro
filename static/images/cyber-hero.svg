<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#heroGradient)" opacity="0.1"/>
  
  <!-- Network Grid -->
  <g opacity="0.3">
    <line x1="50" y1="50" x2="550" y2="50" stroke="#00d4ff" stroke-width="1"/>
    <line x1="50" y1="150" x2="550" y2="150" stroke="#00d4ff" stroke-width="1"/>
    <line x1="50" y1="250" x2="550" y2="250" stroke="#00d4ff" stroke-width="1"/>
    <line x1="50" y1="350" x2="550" y2="350" stroke="#00d4ff" stroke-width="1"/>
    <line x1="150" y1="50" x2="150" y2="350" stroke="#00d4ff" stroke-width="1"/>
    <line x1="300" y1="50" x2="300" y2="350" stroke="#00d4ff" stroke-width="1"/>
    <line x1="450" y1="50" x2="450" y2="350" stroke="#00d4ff" stroke-width="1"/>
  </g>
  
  <!-- Central Shield -->
  <g transform="translate(300, 200)">
    <path d="M0 -80L-60 -40l0 60c0 33.6 22.8 64.8 54 72 31.2-7.2 54-38.4 54-72L48 -40l-48-40z" 
          fill="url(#shieldGrad)" opacity="0.8"/>
    <path d="M0 -70L-50 -35l0 50c0 27 20 55 45 60 25-5 45-33 45-60L40 -35l-40-35z" 
          fill="none" stroke="#00ff88" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="#00d4ff">
      <animate attributeName="r" values="12;18;12" dur="2s" repeatCount="indefinite"/>
    </circle>
    <path d="M-8 -4l6 6 16-16" stroke="#000" stroke-width="3" fill="none"/>
    
    <!-- Rotating scan lines -->
    <g>
      <line x1="0" y1="0" x2="0" y2="-60" stroke="#00ff88" stroke-width="2" opacity="0.7">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="0" x2="0" y2="-40" stroke="#ff0059" stroke-width="2" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" values="180;540" dur="3s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>
  
  <!-- Floating Security Icons -->
  <g opacity="0.6">
    <!-- Lock -->
    <g transform="translate(100, 100)">
      <rect x="-8" y="-5" width="16" height="12" rx="2" fill="#8b5cf6"/>
      <path d="M-6 -5v-4a6 6 0 0 1 12 0v4" fill="none" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="0" cy="1" r="3" fill="#00ff88">
        <animate attributeName="fill" values="#00ff88;#ff0059;#00ff88" dur="2s" repeatCount="indefinite"/>
      </circle>
      <animateTransform attributeName="transform" type="translate" values="100 100;100 80;100 100" dur="4s" repeatCount="indefinite"/>
    </g>
    
    <!-- Key -->
    <g transform="translate(500, 120)">
      <circle cx="0" cy="0" r="8" fill="#00d4ff"/>
      <rect x="8" y="-2" width="20" height="4" fill="#00d4ff"/>
      <rect x="24" y="-6" width="4" height="4" fill="#00d4ff"/>
      <rect x="24" y="2" width="4" height="4" fill="#00d4ff"/>
      <animateTransform attributeName="transform" type="translate" values="500 120;500 140;500 120" dur="3s" repeatCount="indefinite"/>
    </g>
    
    <!-- Network Node -->
    <g transform="translate(80, 300)">
      <circle cx="0" cy="0" r="6" fill="#00ff88"/>
      <line x1="-15" y1="-10" x2="15" y2="10" stroke="#00ff88" stroke-width="2"/>
      <line x1="15" y1="-10" x2="-15" y2="10" stroke="#00ff88" stroke-width="2"/>
      <animateTransform attributeName="transform" type="translate" values="80 300;80 280;80 300" dur="5s" repeatCount="indefinite"/>
    </g>
    
    <!-- CPU Chip -->
    <g transform="translate(520, 320)">
      <rect x="-10" y="-10" width="20" height="20" rx="2" fill="#ff0059" opacity="0.8"/>
      <rect x="-6" y="-6" width="12" height="12" rx="1" fill="#00d4ff"/>
      <!-- Pins -->
      <rect x="-15" y="-3" width="5" height="2" fill="#ffffff"/>
      <rect x="-15" y="1" width="5" height="2" fill="#ffffff"/>
      <rect x="10" y="-3" width="5" height="2" fill="#ffffff"/>
      <rect x="10" y="1" width="5" height="2" fill="#ffffff"/>
      <animateTransform attributeName="transform" type="translate" values="520 320;520 300;520 320" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Data Flow Lines -->
  <g opacity="0.4">
    <polyline points="100,100 200,150 300,120 400,180 500,120" 
              fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="1s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="80,300 180,250 280,280 380,220 520,320" 
              fill="none" stroke="#00ff88" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="1.5s" repeatCount="indefinite"/>
    </polyline>
  </g>
  
  <!-- Security Radar Rings -->
  <g transform="translate(300, 200)" opacity="0.3">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#00d4ff" stroke-width="1">
      <animate attributeName="r" values="120;150;120" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#00ff88" stroke-width="1">
      <animate attributeName="r" values="160;190;160" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>