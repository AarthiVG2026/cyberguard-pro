<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Circuit pattern -->
    <pattern id="circuitPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="none"/>
      <path d="M0 50 L20 50 L20 20 L50 20 L50 0 M50 50 L80 50 L80 80 L100 80" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.3"/>
      <circle cx="20" cy="50" r="3" fill="#00d4ff" opacity="0.5"/>
      <circle cx="50" cy="20" r="3" fill="#8b5cf6" opacity="0.5"/>
      <circle cx="80" cy="80" r="3" fill="#00ff88" opacity="0.5"/>
    </pattern>
    
    <!-- Binary code pattern -->
    <pattern id="binaryPattern" x="0" y="0" width="200" height="20" patternUnits="userSpaceOnUse">
      <rect width="200" height="20" fill="none"/>
      <text x="10" y="15" font-family="monospace" font-size="12" fill="#00d4ff" opacity="0.3">1010011001</text>
      <text x="110" y="15" font-family="monospace" font-size="12" fill="#8b5cf6" opacity="0.3">1100101010</text>
    </pattern>
    
    <!-- Shield pattern -->
    <g id="shieldIcon">
      <path d="M12 2L2 7l0 10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12L20 7l-10-5z" fill="#00d4ff" opacity="0.4"/>
      <path d="M12 3L3 7.5l0 8.5c0 4.5 3.5 8.5 8 9.5 4.5-1 8-5 8-9.5L19 7.5l-9-4.5z" fill="none" stroke="#00ff88" stroke-width="2"/>
    </g>
    
    <!-- Lock icon -->
    <g id="lockIcon">
      <rect x="6" y="10" width="12" height="8" rx="2" fill="#ff0059" opacity="0.4"/>
      <path d="M8 10v-2a4 4 0 0 1 8 0v2" fill="none" stroke="#00d4ff" stroke-width="2"/>
    </g>
    
    <!-- Network nodes -->
    <g id="networkNode">
      <circle cx="0" cy="0" r="4" fill="#00d4ff" opacity="0.6"/>
      <circle cx="0" cy="0" r="8" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    </g>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#cyberGradient)"/>
  
  <!-- Circuit board pattern -->
  <rect width="1920" height="1080" fill="url(#circuitPattern)" opacity="0.7"/>
  
  <!-- Binary code streams -->
  <rect x="0" y="100" width="1920" height="20" fill="url(#binaryPattern)"/>
  <rect x="0" y="300" width="1920" height="20" fill="url(#binaryPattern)"/>
  <rect x="0" y="500" width="1920" height="20" fill="url(#binaryPattern)"/>
  <rect x="0" y="700" width="1920" height="20" fill="url(#binaryPattern)"/>
  <rect x="0" y="900" width="1920" height="20" fill="url(#binaryPattern)"/>
  
  <!-- Shield icons scattered -->
  <use href="#shieldIcon" x="150" y="150" transform="scale(2)"/>
  <use href="#shieldIcon" x="1600" y="250" transform="scale(1.5)"/>
  <use href="#shieldIcon" x="400" y="800" transform="scale(1.8)"/>
  <use href="#shieldIcon" x="1200" y="600" transform="scale(1.3)"/>
  
  <!-- Lock icons -->
  <use href="#lockIcon" x="800" y="200" transform="scale(2.5)"/>
  <use href="#lockIcon" x="1400" y="800" transform="scale(2)"/>
  <use href="#lockIcon" x="300" y="400" transform="scale(1.5)"/>
  
  <!-- Network connection lines -->
  <g stroke="#00d4ff" stroke-width="2" opacity="0.3" fill="none">
    <path d="M200 200 Q600 100 1000 300 T1600 400"/>
    <path d="M100 500 Q800 300 1500 600"/>
    <path d="M300 800 Q900 700 1400 900"/>
  </g>
  
  <!-- Network nodes -->
  <use href="#networkNode" x="200" y="200"/>
  <use href="#networkNode" x="1000" y="300"/>
  <use href="#networkNode" x="1600" y="400"/>
  <use href="#networkNode" x="100" y="500"/>
  <use href="#networkNode" x="1500" y="600"/>
  <use href="#networkNode" x="300" y="800"/>
  <use href="#networkNode" x="1400" y="900"/>
  
  <!-- Floating geometric shapes -->
  <polygon points="50,50 100,75 75,125 25,125" fill="#8b5cf6" opacity="0.2"/>
  <polygon points="1700,100 1750,150 1700,200 1650,150" fill="#00ff88" opacity="0.2"/>
  <polygon points="1000,50 1050,100 1000,150 950,100" fill="#ff0059" opacity="0.2"/>
  
  <!-- Hexagonal pattern -->
  <g stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.2">
    <polygon points="500,400 520,390 540,400 540,420 520,430 500,420"/>
    <polygon points="1300,300 1320,290 1340,300 1340,320 1320,330 1300,320"/>
    <polygon points="700,700 720,690 740,700 740,720 720,730 700,720"/>
  </g>
  
  <!-- Animated scanning lines -->
  <g opacity="0.4">
    <line x1="0" y1="300" x2="1920" y2="300" stroke="#00d4ff" stroke-width="2">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="700" x2="1920" y2="700" stroke="#00ff88" stroke-width="2">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>